<!doctype html>
<html>
  <head>
    <title>Portal Lowongan Pekerjaan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Masukkan Data Lamaran</h2>

    <form id="formLamaran">
      <label for="nama">Nama Pelamar:</label>
      <input type="text" id="nama" required placeholder="Masukkan nama lengkap" />
      <br /><br />

      <label for="usia">Usia:</label>
      <input type="number" id="usia" required min="18" placeholder="Minimal usia 18 tahun" />
      <br /><br />

      <button type="submit">Kirim Data</button>
    </form>

    <script>
      // 1. Menangkap aksi saat tombol "Kirim Data" diklik
      document.getElementById("formLamaran").addEventListener("submit", function (event) {
        event.preventDefault(); // Mencegah web melakukan refresh secara otomatis

        // 2. Membungkus data dari kotak isian ke format JSON
        let paketData = {
          nama: document.getElementById("inputNama").value,
          usia: document.getElementById("inputUsia").value,
        };

        // 3. Memanggil kurir fetch() untuk mengirim data ke Vercel
        fetch("https://proyek-backend-ai.vercel.app/lamar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(paketData),
        })
          .then((jawaban) => jawaban.text())
          .then((pesan) => alert("Pesan dari pelayan: " + pesan))
          .catch((error) => console.log("Terjadi kesalahan:", error));
      });
    </script>
  </body>
</html>
